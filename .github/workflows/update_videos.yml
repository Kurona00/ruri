name: Update Latest Videos

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required to push back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper script
        env:
          TEST_ACC_USERNAME: ${{ secrets.TEST_ACC_USERNAME }}
          TEST_ACC_PASSWORD: ${{ secrets.TEST_ACC_PASSWORD }}
        run: |
          python scrape.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/latest_videos.json
          
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update latest videos JSON" && git push)
